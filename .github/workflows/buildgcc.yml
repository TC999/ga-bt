name: GCC 编译
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'GCC 版本'
        required: true
        default: 'releases/gcc-15.1.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential \
          libgmp-dev \
          libmpfr-dev \
          libmpc-dev \
          libc6-dev \
          libtbb-dev
      - name: Checkout
        run: |
          git clone https://github.com/gcc-mirror/gcc.git --depth=1 --single-branch -b ${{ inputs.version }} .
      
      - name: Build GCC
        run: |
          ./configure
          make -j$(nproc)