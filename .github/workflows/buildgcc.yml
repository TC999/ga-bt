name: GCC 编译
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'GCC 版本'
        required: true
        default: 'releases/gcc-15.1.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential \
          libgmp-dev \
          libmpfr-dev \
          libmpc-dev \
          libc6-dev \
          libtbb-dev
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.version }}
      
      - name: Build GCC
        run: |
          ./configure
          make -j$(nproc)